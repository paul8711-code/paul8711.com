<script>
    async function syncProgress() {
    const rawReadmeUrl = 'https://raw.githubusercontent.com/paul8711-code/meteorite/refs/heads/dev/README.md';

    try {
        const response = await fetch(rawReadmeUrl);
        const text = await response.text();

        const regex = /https:\/\/geps\.dev\/progress\/[\d.]+\?barColor=[a-zA-Z0-9]+/;
        const match = text.match(regex);

        if (match) {
            document.querySelector('.progress img').src = match[0];
        }
    } catch (e) {
        console.error("Couldn't sync progress:", e);
    }
}

syncProgress();
</script>
